
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-background-tertiary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
button{cursor:pointer;font-family:inherit}
.tile:active{transform:scale(0.93)}
</style>

<h2 class="sr-only">Tracker de figuritas Panini FIFA World Cup 2026 — marcá las que tenés y las repetidas</h2>
<div id="root" style="max-width:480px;margin:0 auto;min-height:100vh;background:var(--color-background-primary)"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const TEAMS=[
  {code:"MEX",name:"México",flag:"🇲🇽"},{code:"RSA",name:"Sudáfrica",flag:"🇿🇦"},
  {code:"KOR",name:"Corea del Sur",flag:"🇰🇷"},{code:"CZE",name:"Chequia",flag:"🇨🇿"},
  {code:"CAN",name:"Canadá",flag:"🇨🇦"},{code:"BIH",name:"Bosnia-Herz.",flag:"🇧🇦"},
  {code:"QAT",name:"Qatar",flag:"🇶🇦"},{code:"SUI",name:"Suiza",flag:"🇨🇭"},
  {code:"BRA",name:"Brasil",flag:"🇧🇷"},{code:"MAR",name:"Marruecos",flag:"🇲🇦"},
  {code:"HAI",name:"Haití",flag:"🇭🇹"},{code:"SCO",name:"Escocia",flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
  {code:"USA",name:"EE.UU.",flag:"🇺🇸"},{code:"PAR",name:"Paraguay",flag:"🇵🇾"},
  {code:"AUS",name:"Australia",flag:"🇦🇺"},{code:"TUR",name:"Turquía",flag:"🇹🇷"},
  {code:"GER",name:"Alemania",flag:"🇩🇪"},{code:"CUW",name:"Curazao",flag:"🇨🇼"},
  {code:"CIV",name:"Costa de Marfil",flag:"🇨🇮"},{code:"ECU",name:"Ecuador",flag:"🇪🇨"},
  {code:"NED",name:"Países Bajos",flag:"🇳🇱"},{code:"JPN",name:"Japón",flag:"🇯🇵"},
  {code:"SWE",name:"Suecia",flag:"🇸🇪"},{code:"TUN",name:"Túnez",flag:"🇹🇳"},
  {code:"BEL",name:"Bélgica",flag:"🇧🇪"},{code:"EGY",name:"Egipto",flag:"🇪🇬"},
  {code:"IRN",name:"Irán",flag:"🇮🇷"},{code:"NZL",name:"Nueva Zelanda",flag:"🇳🇿"},
  {code:"ESP",name:"España",flag:"🇪🇸"},{code:"CPV",name:"Cabo Verde",flag:"🇨🇻"},
  {code:"KSA",name:"Arabia Saudita",flag:"🇸🇦"},{code:"URU",name:"Uruguay",flag:"🇺🇾"},
  {code:"FRA",name:"Francia",flag:"🇫🇷"},{code:"SEN",name:"Senegal",flag:"🇸🇳"},
  {code:"IRQ",name:"Irak",flag:"🇮🇶"},{code:"NOR",name:"Noruega",flag:"🇳🇴"},
  {code:"ARG",name:"Argentina",flag:"🇦🇷"},{code:"ALG",name:"Argelia",flag:"🇩🇿"},
  {code:"AUT",name:"Austria",flag:"🇦🇹"},{code:"JOR",name:"Jordania",flag:"🇯🇴"},
  {code:"POR",name:"Portugal",flag:"🇵🇹"},{code:"COD",name:"R.D. Congo",flag:"🇨🇩"},
  {code:"UZB",name:"Uzbekistán",flag:"🇺🇿"},{code:"COL",name:"Colombia",flag:"🇨🇴"},
  {code:"ENG",name:"Inglaterra",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{code:"CRO",name:"Croacia",flag:"🇭🇷"},
  {code:"GHA",name:"Ghana",flag:"🇬🇭"},{code:"PAN",name:"Panamá",flag:"🇵🇦"},
];

const FWC_INTRO=["00",...Array.from({length:8},(_,i)=>`FWC${i+1}`)];
const FWC_FINAL=Array.from({length:11},(_,i)=>`FWC${i+9}`);
const CC=Array.from({length:14},(_,i)=>`CC${i+1}`);

const SECTIONS=[
  {id:"fwc_intro",label:"FWC — Intro",flag:"🏆",stickers:FWC_INTRO},
  ...TEAMS.map(t=>({id:t.code,label:t.name,flag:t.flag,stickers:Array.from({length:20},(_,i)=>`${t.code}${i+1}`)})),
  {id:"fwc_final",label:"FWC — Final",flag:"🏆",stickers:FWC_FINAL},
  {id:"cc",label:"Coca-Cola Calcos",flag:"🥤",stickers:CC},
];

const MAIN_TOTAL=980;
const GRAND_TOTAL=994;

function getStickerInfo(secId,code){
  if(!TEAMS.find(t=>t.code===secId))return{type:"especial"};
  const n=parseInt(code.replace(/[A-Z]+/,""));
  if(n===1)return{type:"escudo",icon:"🛡"};
  if(n===13)return{type:"formación",icon:"📸"};
  return{type:"jugador"};
}

function StickerTile({code,count,secId,onTap,onReset}){
  const longRef=useRef(null);
  const didLong=useRef(false);
  const info=useMemo(()=>getStickerInfo(secId,code),[secId,code]);
  const isHave=count>0,isRepeat=count>1;

  const doTap=()=>onTap(code);
  const doReset=()=>{onReset(code);if(navigator.vibrate)navigator.vibrate(40);};

  const ts=()=>{didLong.current=false;longRef.current=setTimeout(()=>{didLong.current=true;doReset();},600);};
  const te=()=>clearTimeout(longRef.current);
  const tm=()=>clearTimeout(longRef.current);
  const click=()=>{if(didLong.current){didLong.current=false;return;}doTap();};
  const ctx=(e)=>{e.preventDefault();doReset();};

  const bg=isRepeat?"#FAEEDA":isHave?"#EAF3DE":"var(--color-background-secondary)";
  const bc=isRepeat?"#EF9F27":isHave?"#97C459":"var(--color-border-tertiary)";
  const tc=isRepeat?"#854F0B":isHave?"#3B6D11":"var(--color-text-tertiary)";

  return React.createElement("div",{
    className:"tile",
    onTouchStart:ts,onTouchEnd:te,onTouchMove:tm,
    onClick:click,onContextMenu:ctx,
    style:{
      aspectRatio:"1",borderRadius:"var(--border-radius-md)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",
      position:"relative",border:`0.5px solid ${bc}`,background:bg,
      transition:"transform 0.08s",
    }
  },
    isRepeat&&React.createElement("div",{style:{position:"absolute",top:2,right:3,fontSize:8,fontWeight:500,color:"#854F0B"}},`×${count}`),
    info.icon&&React.createElement("div",{style:{fontSize:10,lineHeight:1,marginBottom:1}},info.icon),
    React.createElement("div",{style:{fontSize:8,fontWeight:500,letterSpacing:0.2,color:tc,textAlign:"center",lineHeight:1.2,padding:"0 2px"}},code),
    isHave&&!isRepeat&&React.createElement("i",{className:"ti ti-check","aria-hidden":"true",style:{fontSize:11,color:"#3B6D11",marginTop:1}})
  );
}

function SectionView({section,col,onTap,onReset,onBack}){
  const [filter,setFilter]=useState("all");
  const sHave=section.stickers.filter(s=>col[s]>0).length;
  const sPct=Math.round((sHave/section.stickers.length)*100);
  const shown=useMemo(()=>{
    if(filter==="missing")return section.stickers.filter(s=>!(col[s]>0));
    if(filter==="repeated")return section.stickers.filter(s=>col[s]>1);
    return section.stickers;
  },[section,col,filter]);

  return React.createElement("div",{style:{minHeight:"100vh",paddingBottom:20}},
    React.createElement("div",{style:{
      position:"sticky",top:0,zIndex:10,
      background:"var(--color-background-primary)",
      borderBottom:"0.5px solid var(--color-border-tertiary)",
      padding:"10px 12px 8px"
    }},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
        React.createElement("button",{onClick:()=>{onBack();},style:{
          background:"none",border:"0.5px solid var(--color-border-secondary)",
          borderRadius:"var(--border-radius-md)",padding:"5px 10px",
          fontSize:13,color:"var(--color-text-primary)",display:"flex",alignItems:"center",gap:4
        }},
          React.createElement("i",{className:"ti ti-arrow-left","aria-hidden":"true",style:{fontSize:14}}),
          "Volver"
        ),
        React.createElement("div",{style:{flex:1,overflow:"hidden",display:"flex",alignItems:"center",gap:6}},
          React.createElement("span",{style:{fontSize:18}},section.flag),
          React.createElement("span",{style:{fontWeight:500,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--color-text-primary)"}},section.label)
        ),
        React.createElement("div",{style:{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",flexShrink:0}},
          `${sHave}/${section.stickers.length} · ${sPct}%`
        )
      ),
      React.createElement("div",{style:{height:5,background:"var(--color-background-tertiary)",borderRadius:3,overflow:"hidden",marginBottom:8}},
        React.createElement("div",{style:{height:"100%",width:`${sPct}%`,background:"#639922",borderRadius:3,transition:"width 0.3s"}})
      ),
      React.createElement("div",{style:{display:"flex",gap:6}},
        [["all","Todas"],["missing","Me faltan"],["repeated","Repetidas"]].map(([f,lbl])=>
          React.createElement("button",{key:f,onClick:()=>setFilter(f),style:{
            flex:1,padding:"5px 4px",fontSize:11,fontWeight:filter===f?500:400,
            background:filter===f?"#EAF3DE":"var(--color-background-secondary)",
            color:filter===f?"#3B6D11":"var(--color-text-secondary)",
            border:filter===f?"0.5px solid #97C459":"0.5px solid var(--color-border-tertiary)",
            borderRadius:"var(--border-radius-md)"
          }},lbl)
        )
      )
    ),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,padding:10}},
      shown.length===0
        ? React.createElement("div",{style:{gridColumn:"1/-1",textAlign:"center",padding:"40px 20px",color:"var(--color-text-secondary)",fontSize:14}},
            filter==="missing"?"¡Completaste esta sección! 🎉":"No hay repetidas aquí"
          )
        : shown.map(code=>React.createElement(StickerTile,{
            key:code,code,count:col[code]||0,
            secId:section.id,onTap,onReset
          }))
    )
  );
}

function RepeatedView({col,sections,onTap,onReset}){
  const grouped=useMemo(()=>{
    const g={};
    sections.forEach(sec=>{
      sec.stickers.forEach(code=>{
        if((col[code]||0)>1){
          if(!g[sec.id])g[sec.id]={section:sec,items:[]};
          g[sec.id].items.push({code,count:col[code]});
        }
      });
    });
    return Object.values(g);
  },[col,sections]);

  const total=grouped.reduce((s,{items})=>s+items.reduce((ss,{count})=>ss+(count-1),0),0);
  const codes=grouped.reduce((s,{items})=>s+items.length,0);

  if(!grouped.length) return React.createElement("div",{style:{textAlign:"center",padding:"60px 20px",color:"var(--color-text-secondary)"}},
    React.createElement("i",{className:"ti ti-cards","aria-hidden":"true",style:{fontSize:40,display:"block",marginBottom:12}}),
    React.createElement("div",{style:{fontSize:15,fontWeight:500}},"Sin repetidas todavía"),
    React.createElement("div",{style:{fontSize:13,marginTop:4}},"Marcá tus figus en el álbum")
  );

  return React.createElement("div",{style:{padding:10}},
    React.createElement("div",{style:{
      background:"#EAF3DE",border:"0.5px solid #97C459",
      borderRadius:"var(--border-radius-md)",padding:"10px 14px",
      marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"
    }},
      React.createElement("span",{style:{fontSize:13,color:"#3B6D11",fontWeight:500}},
        `${total} figurita${total!==1?"s":""} para cambiar`
      ),
      React.createElement("span",{style:{fontSize:12,color:"#3B6D11"}},`${codes} códigos`)
    ),
    grouped.map(({section,items})=>
      React.createElement("div",{key:section.id,style:{marginBottom:14}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"0 2px"}},
          React.createElement("span",{style:{fontSize:14}},section.flag),
          React.createElement("span",{style:{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)"}},section.label)
        ),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}},
          items.map(({code,count})=>React.createElement(StickerTile,{
            key:code,code,count,secId:section.id,onTap,onReset
          }))
        )
      )
    )
  );
}

function App(){
  const [col,setCol]=useState({});
  const [view,setView]=useState(null);
  const [tab,setTab]=useState("album");
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("figus-wc2026");if(r)setCol(JSON.parse(r.value));}catch{}
      setLoaded(true);
    })();
  },[]);

  const persist=useCallback(async(s)=>{
    try{await window.storage.set("figus-wc2026",JSON.stringify(s));}catch{}
  },[]);

  const tap=useCallback((code)=>{
    setCol(p=>{const n={...p,[code]:(p[code]||0)+1};persist(n);return n;});
  },[persist]);

  const reset=useCallback((code)=>{
    setCol(p=>{const n={...p,[code]:0};persist(n);return n;});
  },[persist]);

  if(!loaded) return React.createElement("div",{style:{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",color:"var(--color-text-secondary)",fontSize:14}},"Cargando colección...");

  const totalHave=Object.values(col).filter(v=>v>0).length;
  const totalRepeats=Object.values(col).reduce((s,v)=>s+Math.max(0,v-1),0);
  const pct=Math.round((totalHave/GRAND_TOTAL)*100);

  if(view){
    const section=SECTIONS.find(s=>s.id===view);
    return React.createElement(SectionView,{section,col,onTap:tap,onReset:reset,onBack:()=>setView(null)});
  }

  return React.createElement("div",{style:{fontFamily:"var(--font-sans)",minHeight:"100vh",paddingBottom:20}},
    React.createElement("div",{style:{
      background:"var(--color-background-primary)",
      borderBottom:"0.5px solid var(--color-border-tertiary)",
      padding:"14px 14px 12px"
    }},
      React.createElement("div",{style:{fontSize:11,fontWeight:500,letterSpacing:1,color:"var(--color-text-secondary)"}},
        "ÁLBUM PANINI"
      ),
      React.createElement("div",{style:{fontSize:20,fontWeight:500,color:"var(--color-text-primary)",marginTop:2}},
        "FIFA World Cup 2026"
      ),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:12}},
        [{label:"Tengo",value:totalHave,color:"#3B6D11"},
         {label:"Me faltan",value:GRAND_TOTAL-totalHave,color:"#993C1D"},
         {label:"Para cambio",value:totalRepeats,color:"#854F0B"}
        ].map(({label,value,color})=>
          React.createElement("div",{key:label,style:{
            background:"var(--color-background-secondary)",
            borderRadius:"var(--border-radius-md)",
            padding:"8px 10px",textAlign:"center"
          }},
            React.createElement("div",{style:{fontSize:22,fontWeight:500,color}},value),
            React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}},label)
          )
        )
      ),
      React.createElement("div",{style:{marginTop:12}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--color-text-secondary)",marginBottom:4}},
          React.createElement("span",null,"Completado"),
          React.createElement("span",{style:{fontWeight:500}},`${pct}% de ${GRAND_TOTAL} figus`)
        ),
        React.createElement("div",{style:{height:6,background:"var(--color-background-tertiary)",borderRadius:3,overflow:"hidden"}},
          React.createElement("div",{style:{height:"100%",width:`${pct}%`,background:"#639922",borderRadius:3,transition:"width 0.3s"}})
        )
      )
    ),
    React.createElement("div",{style:{display:"flex",borderBottom:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-primary)"}},
      [["album","Álbum","ti-layout-grid"],["repetidas","Mis repetidas","ti-refresh"]].map(([t,lbl,icon])=>
        React.createElement("button",{key:t,onClick:()=>setTab(t),style:{
          flex:1,padding:"9px 8px",display:"flex",flexDirection:"column",
          alignItems:"center",gap:2,background:"none",
          border:"none",borderBottom:tab===t?"2px solid #639922":"2px solid transparent",
          color:tab===t?"#3B6D11":"var(--color-text-secondary)"
        }},
          React.createElement("i",{className:`ti ${icon}`,"aria-hidden":"true",style:{fontSize:17}}),
          React.createElement("span",{style:{fontSize:11,fontWeight:tab===t?500:400}},lbl)
        )
      )
    ),
    tab==="album"&&React.createElement("div",{style:{padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}},
      React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",padding:"4px 2px 2px"}},
        "Tocá una sección para ver las figuritas · Tocá cada figu para marcarla · Mantené apretado para borrar"
      ),
      SECTIONS.map(sec=>{
        const have=sec.stickers.filter(s=>col[s]>0).length;
        const p=(have/sec.stickers.length)*100;
        const done=have===sec.stickers.length;
        return React.createElement("button",{key:sec.id,onClick:()=>setView(sec.id),style:{
          display:"flex",alignItems:"center",gap:10,
          background:"var(--color-background-primary)",
          border:"0.5px solid var(--color-border-tertiary)",
          borderRadius:"var(--border-radius-lg)",
          padding:"10px 12px",textAlign:"left",width:"100%"
        }},
          React.createElement("span",{style:{fontSize:20,minWidth:28,textAlign:"center"}},sec.flag),
          React.createElement("div",{style:{flex:1,minWidth:0}},
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}},
              React.createElement("span",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},sec.label),
              React.createElement("span",{style:{fontSize:12,fontWeight:500,color:done?"#3B6D11":"var(--color-text-secondary)",flexShrink:0,marginLeft:6}},
                `${have}/${sec.stickers.length}`
              )
            ),
            React.createElement("div",{style:{height:4,background:"var(--color-background-tertiary)",borderRadius:2,overflow:"hidden"}},
              React.createElement("div",{style:{height:"100%",width:`${p}%`,background:done?"#639922":"#97C459",borderRadius:2,transition:"width 0.3s"}})
            )
          ),
          React.createElement("i",{className:"ti ti-chevron-right","aria-hidden":"true",style:{fontSize:15,color:"var(--color-text-tertiary)",flexShrink:0}})
        );
      })
    ),
    tab==="repetidas"&&React.createElement(RepeatedView,{col,sections:SECTIONS,onTap:tap,onReset:reset})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
